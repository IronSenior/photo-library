server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 512;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Astro fingerprints filenames under /_astro/, so they're safe to cache
    # forever — a content change always produces a new filename.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Astro's static build emits one directory per route with its own
    # index.html (e.g. /foto/mi-foto/index.html); this resolves both
    # "/foto/mi-foto" and "/foto/mi-foto/" to that file.
    location / {
        try_files $uri $uri/ =404;
    }
}
